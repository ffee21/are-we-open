<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DJ16CN6QK4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DJ16CN6QK4');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업데이트 이력 — Are We Open?</title>
  <meta name="description" content="Are We Open? 프로젝트의 분석 업데이트 이력">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav"></div>
  <main>
    <section class="section" style="padding-top: var(--space-2xl);">
      <div class="container" style="max-width: 800px;">
        <div class="section-header">
          <h2 class="section-title">업데이트 이력</h2>
          <p class="section-desc">분석 데이터의 업데이트 이력</p>
        </div>

        <div class="stats-grid" style="margin-bottom: var(--space-2xl);">
          <div class="card stat-card">
            <div class="stat-value" id="lastUpdate">—</div>
            <div class="stat-label">최근 분석일</div>
          </div>
          <div class="card stat-card">
            <div class="stat-value" id="totalScanned">—</div>
            <div class="stat-label">분석 완료 기관</div>
          </div>
        </div>

        <h3 style="font-family: var(--font-display); font-size: 1.25rem; color: var(--navy); margin-bottom: var(--space-lg);">변경 이력</h3>
        <div class="timeline" id="timeline"></div>
      </div>
    </section>
  </main>
  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    App.initPage('updates', function(data) {
      var orgs = data.organizations;

      document.getElementById('lastUpdate').textContent = data.meta.last_updated ? data.meta.last_updated.split('T')[0] : '—';
      document.getElementById('totalScanned').textContent = orgs.length + '개';

      var timelineEl = document.getElementById('timeline');
      var updates = [
        {
          date: '2026-03-17',
          title: '정기 데이터 업데이트',
          desc: '734개 전체 기관 재분석 완료. 평균 점수 53.0점. 등급 분포: A+ 7개, A 35개, B+ 150개, B 113개, C 203개, D 212개, F 14개. Playwright 심층 분석(454개 기관) 포함.'
        },
        {
          date: '2026-03-15',
          title: '전체 734개 기관 분석 완료',
          desc: '중앙행정기관 40개(19부·6처·15청), 독립기관 11개, 사법부 25개, 검찰 17개, 경찰 18개, 입법부 18개, 교육청 17개, 광역 지자체 17개, 기초 지자체 227개, 공공기관 344개의 데이터 개방 수준을 분석했습니다.'
        },
        {
          date: '2026-03-15',
          title: '프로젝트 시작',
          desc: '대한민국 공공 웹사이트의 데이터 개방 수준을 평가하는 "Are We Open?" 프로젝트를 시작했습니다. 정부조직법과 ALIO 데이터를 기반으로 분석 대상을 선정했습니다.'
        }
      ];

      updates.forEach(function(u) {
        var item = document.createElement('div');
        item.className = 'timeline-item';
        var date = document.createElement('div');
        date.className = 'timeline-date';
        date.textContent = u.date;
        var title = document.createElement('div');
        title.className = 'timeline-title';
        title.textContent = u.title;
        var desc = document.createElement('div');
        desc.className = 'timeline-desc';
        desc.textContent = u.desc;
        item.appendChild(date);
        item.appendChild(title);
        item.appendChild(desc);
        timelineEl.appendChild(item);
      });
    });
  </script>
</body>
</html>
