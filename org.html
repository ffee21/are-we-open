<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기관 상세 — Are We Open?</title>
  <meta name="description" content="기관별 LLM 친화성 분석 상세 결과">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Scoring criteria tooltip styles */
    .item-code-btn {
      background: none;
      border: none;
      padding: 2px 6px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--navy-light);
      cursor: pointer;
      text-decoration: underline dotted;
      border-radius: var(--radius-sm);
      transition: background var(--duration) var(--ease);
    }
    .item-code-btn:hover {
      background: var(--bg-warm);
    }
    .scoring-criteria {
      display: none;
      margin-top: var(--space-xs);
      padding: var(--space-sm) var(--space-md);
      background: var(--bg-warm);
      border-radius: var(--radius-sm);
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--text-secondary);
      border-left: 3px solid var(--navy-light);
    }
    .scoring-criteria.open {
      display: block;
    }
    .scoring-criteria-label {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    /* Snapshot tab styles */
    .snapshot-section {
      margin-bottom: var(--space-xl);
    }
    .snapshot-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      font-size: 0.7rem;
      font-weight: 600;
      margin-left: var(--space-sm);
      vertical-align: middle;
    }
    .snapshot-badge.exists {
      background: rgba(42, 127, 98, 0.1);
      color: var(--jade);
    }
    .snapshot-badge.missing {
      background: rgba(201, 53, 69, 0.1);
      color: var(--vermillion);
    }
    /* Crawler mentioned badge */
    .crawler-mentioned {
      font-size: 0.65rem;
      padding: 1px 5px;
      border-radius: var(--radius-sm);
      margin-left: 4px;
      background: rgba(91, 155, 213, 0.1);
      color: var(--severity-info);
    }
    /* Recommendation card */
    .recommendation-card {
      padding: var(--space-md) var(--space-lg);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-md);
      background: var(--surface);
    }
    .recommendation-card-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-xs);
    }
    .recommendation-card-body {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="nav"></div>
  <main>
    <div class="container">
      <a href="ranking.html" class="back-link">&larr; 순위표로 돌아가기</a>
      <div id="orgContent">
        <div class="loading">데이터 로딩 중</div>
      </div>
    </div>
  </main>
  <div id="footer"></div>

  <script src="js/app.js"></script>
  <script>
    App.initPage('ranking', function(data) {
      var orgId = App.getParam('id');
      var org = data.organizations.find(function(o) { return o.org_id === orgId; });
      var root = document.getElementById('orgContent');

      if (!org) {
        root.textContent = '';
        var empty = document.createElement('div');
        empty.className = 'empty-state';
        var p = document.createElement('p');
        p.textContent = '해당 기관을 찾을 수 없습니다.';
        empty.appendChild(p);
        root.appendChild(empty);
        return;
      }

      document.title = org.name + ' \u2014 Are We Open?';
      root.textContent = '';

      // === Header ===
      var header = document.createElement('div');
      header.className = 'org-header';

      var info = document.createElement('div');
      info.className = 'org-header-info';
      var h1 = document.createElement('h1');
      h1.textContent = org.name;
      info.appendChild(h1);

      var meta = document.createElement('div');
      meta.className = 'org-meta';
      var metaItems = [
        { label: org.name_en },
        { label: App.orgTypeLabel(org.org_type) },
        { label: '\uBD84\uC11D\uC77C: ' + org.scan_date }
      ];
      metaItems.forEach(function(m) {
        var span = document.createElement('span');
        span.textContent = m.label;
        meta.appendChild(span);
      });
      info.appendChild(meta);

      var urlLink = document.createElement('a');
      urlLink.href = org.url;
      urlLink.target = '_blank';
      urlLink.rel = 'noopener';
      urlLink.textContent = org.url;
      urlLink.style.cssText = 'display:block;margin-top:var(--space-sm);font-size:0.85rem;color:var(--text-tertiary)';
      info.appendChild(urlLink);

      header.appendChild(info);

      // Score summary
      var scoreSummary = document.createElement('div');
      scoreSummary.className = 'org-score-summary';

      var totalDiv = document.createElement('div');
      totalDiv.className = 'org-total-score';
      var scoreNum = document.createElement('div');
      scoreNum.className = 'score-number';
      scoreNum.textContent = org.scores.total;
      var scoreMax = document.createElement('div');
      scoreMax.className = 'score-max';
      scoreMax.textContent = '/ 100';
      totalDiv.appendChild(scoreNum);
      totalDiv.appendChild(scoreMax);
      scoreSummary.appendChild(totalDiv);

      var badge = document.createElement('span');
      badge.className = 'grade-badge grade-badge-xl ' + App.getGradeClass(org.scores.grade);
      badge.textContent = org.scores.grade;
      scoreSummary.appendChild(badge);

      header.appendChild(scoreSummary);
      root.appendChild(header);

      // === Tabs ===
      var tabData = [
        { id: 'scores', label: '\uC810\uC218 \uC0C1\uC138' },
        { id: 'issues', label: '\uBB38\uC81C\uC0AC\uD56D (' + (org.issues || []).length + ')' },
        { id: 'crawlers', label: '\uD06C\uB864\uB7EC \uD604\uD669' },
        { id: 'snapshots', label: '\uC6D0\uBCF8 \uD30C\uC77C' },
        { id: 'suggestion', label: '\uAC1C\uC120 \uC81C\uC548' }
      ];

      var tabsDiv = document.createElement('div');
      tabsDiv.className = 'tabs';
      var panels = {};

      tabData.forEach(function(t, i) {
        var btn = document.createElement('button');
        btn.className = 'tab' + (i === 0 ? ' active' : '');
        btn.textContent = t.label;
        btn.setAttribute('data-tab', t.id);
        btn.addEventListener('click', function() {
          tabsDiv.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          Object.values(panels).forEach(function(p) { p.style.display = 'none'; });
          panels[t.id].style.display = 'block';
        });
        tabsDiv.appendChild(btn);

        var panel = document.createElement('div');
        panel.className = 'tab-content';
        panel.style.display = i === 0 ? 'block' : 'none';
        panels[t.id] = panel;
      });

      root.appendChild(tabsDiv);

      // === Helper: build scoring criteria detail for an item code ===
      function buildScoringCriteria(code) {
        var itemInfo = App.ITEM_DESCRIPTIONS[code];
        if (!itemInfo) return null;

        // 각 항목의 전체 점수 기준 (0점~만점)
        var criteriaMap = {
          'RT-01': [
            { score: 5, text: 'robots.txt가 존재하고 HTTP 200으로 응답' },
            { score: 0, text: 'robots.txt가 존재하지 않음 (404 등)' }
          ],
          'RT-02': [
            { score: 3, text: 'robots.txt 문법이 올바르고 파싱 에러 없음' },
            { score: 2, text: '경미한 문법 오류 (2개 이하)' },
            { score: 0, text: '심각한 문법 오류 또는 파싱 불가' }
          ],
          'RT-03': [
            { score: 7, text: 'LLM 크롤러(GPTBot, ClaudeBot 등)가 모두 허용됨' },
            { score: 4, text: 'LLM 크롤러 1~2개가 차단됨' },
            { score: 2, text: 'LLM 크롤러 3~4개가 차단됨' },
            { score: 0, text: 'LLM 크롤러 대부분 차단 또는 전면 차단' }
          ],
          'RT-04': [
            { score: 5, text: '전면 차단(Disallow: /)이 없음' },
            { score: 0, text: 'User-agent: * Disallow: / 로 모든 크롤러 전면 차단' }
          ],
          'RT-05': [
            { score: 5, text: '보도자료/정책/공지 경로가 차단되지 않음' },
            { score: 3, text: '일부 콘텐츠 경로가 차단됨' },
            { score: 0, text: '핵심 콘텐츠 경로가 대부분 차단됨' }
          ],
          'CA-01': [
            { score: 7, text: '보도자료 경로에 LLM이 차단 없이 접근 가능' },
            { score: 3, text: '보도자료 경로가 부분 차단 (전면 차단 아님)' },
            { score: 0, text: '보도자료 경로가 완전 차단됨' }
          ],
          'CA-02': [
            { score: 5, text: '정책소개 경로에 LLM이 차단 없이 접근 가능' },
            { score: 2, text: '정책소개 경로가 부분 차단' },
            { score: 0, text: '정책소개 경로가 완전 차단됨' }
          ],
          'CA-03': [
            { score: 5, text: '공지사항 경로에 LLM이 차단 없이 접근 가능' },
            { score: 2, text: '공지사항 경로가 부분 차단' },
            { score: 0, text: '공지사항 경로가 완전 차단됨' }
          ],
          'CA-04': [
            { score: 4, text: 'sitemap에 10개 이상 콘텐츠 URL 포함' },
            { score: 2, text: 'sitemap 존재하나 콘텐츠 URL 부족' },
            { score: 0, text: 'sitemap 없음 또는 콘텐츠 미포함' }
          ],
          'CA-05': [
            { score: 4, text: 'SSR 방식으로 LLM이 JS 없이 콘텐츠 읽기 가능' },
            { score: 0, text: 'CSR 방식으로 LLM이 콘텐츠를 읽기 어려움' }
          ],
          'SD-01': [
            { score: 4, text: '고유한 title 태그가 존재함' },
            { score: 0, text: 'title 태그가 없거나 비어 있음' }
          ],
          'SD-02': [
            { score: 4, text: 'meta description이 존재하여 LLM이 페이지 요약 파악 가능' },
            { score: 0, text: 'meta description이 없음' }
          ],
          'SD-03': [
            { score: 4, text: 'Open Graph 태그(og:title, og:description 등) 존재' },
            { score: 0, text: 'Open Graph 태그가 없음' }
          ],
          'SD-04': [
            { score: 5, text: 'JSON-LD 등 schema.org 구조화 데이터 존재' },
            { score: 0, text: 'schema.org 구조화 데이터가 없음' }
          ],
          'SD-05': [
            { score: 3, text: 'html lang="ko" 속성이 설정되어 있음' },
            { score: 0, text: 'lang 속성이 없어 LLM이 언어 인식 불가' }
          ],
          'TA-01': [
            { score: 3, text: 'HTTPS로 보안 접속 가능' },
            { score: 0, text: 'HTTPS 미적용 (HTTP만 가능)' }
          ],
          'TA-02': [
            { score: 4, text: 'TTFB 1초 미만으로 빠른 응답' },
            { score: 2, text: 'TTFB 1~3초로 보통 수준' },
            { score: 0, text: 'TTFB 3초 이상으로 타임아웃 위험' }
          ],
          'TA-03': [
            { score: 4, text: '메인 페이지가 HTTP 200으로 정상 응답' },
            { score: 0, text: '메인 페이지가 오류 상태코드 반환' }
          ],
          'TA-04': [
            { score: 4, text: 'viewport 설정이 있어 모바일 대응' },
            { score: 0, text: 'viewport 설정이 없어 모바일 미대응' }
          ],
          'LT-01': [
            { score: 4, text: 'llms.txt 파일이 존재함' },
            { score: 0, text: 'llms.txt 파일이 없음' }
          ],
          'LT-02': [
            { score: 3, text: 'llms.txt 내용이 100자 이상으로 충실' },
            { score: 1, text: 'llms.txt가 있으나 내용이 빈약' },
            { score: 0, text: 'llms.txt 없음 또는 형식 미준수' }
          ],
          'LT-03': [
            { score: 3, text: '기관 설명 + 핵심 콘텐츠 경로 + URL 안내 포함' },
            { score: 1, text: '기관 설명은 있으나 링크 없음' },
            { score: 0, text: '충분한 정보를 제공하지 않음' }
          ],
          'SM-01': [
            { score: 2, text: 'sitemap.xml이 존재하여 콘텐츠 발견 가능' },
            { score: 0, text: 'sitemap.xml이 없음' }
          ],
          'SM-02': [
            { score: 3, text: '보도자료/정책/공지 URL이 sitemap에 포함 (5개 이상)' },
            { score: 1, text: 'sitemap이 있으나 콘텐츠 URL 부족' },
            { score: 0, text: '핵심 콘텐츠 URL이 sitemap에 없음' }
          ]
        };

        var levels = criteriaMap[code];
        if (!levels) return null;

        var div = document.createElement('div');
        div.className = 'scoring-criteria';

        levels.forEach(function(level) {
          var row = document.createElement('div');
          row.style.marginBottom = '2px';
          var prefix = level.score === itemInfo.max ? '\u2714 ' : level.score === 0 ? '\u2716 ' : '\u25CB ';
          var label = level.score + '\uC810';
          if (level.score === itemInfo.max) {
            row.className = 'scoring-criteria-label';
            label += '(\uB9CC\uC810)';
          }
          row.textContent = prefix + label + ': ' + level.text;
          div.appendChild(row);
        });

        return div;
      }

      // === Tab: Scores ===
      var scoresPanel = panels.scores;
      var catGrid = document.createElement('div');
      catGrid.className = 'category-scores';

      Object.keys(App.CATEGORIES).forEach(function(ck) {
        var catInfo = App.CATEGORIES[ck];
        var catScore = org.scores.categories[ck];
        if (!catScore) return;

        var card = document.createElement('div');
        card.className = 'category-score-card';

        var name = document.createElement('span');
        name.className = 'cat-name';
        name.textContent = catInfo.name;

        var barTrack = document.createElement('div');
        barTrack.className = 'cat-bar';
        var barFill = document.createElement('div');
        barFill.className = 'cat-bar-fill';
        var pct = (catScore.score / catScore.max) * 100;
        barFill.style.width = pct + '%';
        var grade = App.gradeFromScore(pct);
        barFill.style.background = App.getGradeColor(grade);
        barTrack.appendChild(barFill);

        var scoreText = document.createElement('span');
        scoreText.className = 'cat-score';
        scoreText.textContent = catScore.score + ' / ' + catScore.max;

        card.appendChild(name);
        card.appendChild(barTrack);
        card.appendChild(scoreText);
        catGrid.appendChild(card);
      });
      scoresPanel.appendChild(catGrid);

      // Item-level scores table
      var itemTitle = document.createElement('h3');
      itemTitle.style.cssText = 'margin: var(--space-xl) 0 var(--space-md); font-size: 1rem;';
      itemTitle.textContent = '\uD56D\uBAA9\uBCC4 \uC810\uC218';
      scoresPanel.appendChild(itemTitle);

      var itemHint = document.createElement('p');
      itemHint.style.cssText = 'font-size: 0.78rem; color: var(--text-tertiary); margin-bottom: var(--space-md);';
      itemHint.textContent = '\uD56D\uBAA9 \uCF54\uB4DC\uB97C \uD074\uB9AD\uD558\uBA74 \uD310\uC815 \uAE30\uC900 \uC0C1\uC138\uB97C \uD655\uC778\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.';
      scoresPanel.appendChild(itemHint);

      var itemsTable = document.createElement('div');
      itemsTable.className = 'table-container';
      var tbl = document.createElement('table');
      var tHead = document.createElement('thead');
      var hRow = document.createElement('tr');
      ['\uD56D\uBAA9 \uCF54\uB4DC', '\uD56D\uBAA9\uBA85', '\uD310\uC815 \uAE30\uC900', '\uC810\uC218', '\uBE44\uC728'].forEach(function(h) {
        var th = document.createElement('th');
        th.textContent = h;
        hRow.appendChild(th);
      });
      tHead.appendChild(hRow);
      tbl.appendChild(tHead);

      var tBody = document.createElement('tbody');
      Object.keys(App.ITEM_DESCRIPTIONS).forEach(function(code) {
        var itemInfo = App.ITEM_DESCRIPTIONS[code];
        var val = org.scores.items[code];
        if (val === undefined) val = 0;
        var max = itemInfo.max;
        var pct = Math.round((val / max) * 100);
        var tr = document.createElement('tr');

        // FIX #5: Item code is a clickable button that toggles scoring criteria
        var tdCode = document.createElement('td');
        tdCode.style.fontFamily = 'var(--font-mono)';
        tdCode.style.fontSize = '0.85rem';
        var codeBtn = document.createElement('button');
        codeBtn.className = 'item-code-btn';
        codeBtn.textContent = code;
        codeBtn.setAttribute('type', 'button');
        tdCode.appendChild(codeBtn);

        var criteriaDiv = buildScoringCriteria(code);

        // Bind click to toggle criteria
        (function(btn, cd) {
          btn.addEventListener('click', function() {
            if (cd) {
              cd.classList.toggle('open');
            }
          });
        })(codeBtn, criteriaDiv);

        var tdName = document.createElement('td');
        tdName.style.cssText = 'white-space:normal;font-size:0.85rem;font-weight:500';
        tdName.textContent = itemInfo.name;

        var tdDesc = document.createElement('td');
        tdDesc.style.cssText = 'white-space:normal;font-size:0.8rem;color:var(--text-tertiary);max-width:200px';
        tdDesc.textContent = itemInfo.desc;

        var tdScore = document.createElement('td');
        tdScore.style.fontFamily = 'var(--font-mono)';
        tdScore.textContent = val + ' / ' + max;

        var tdBar = document.createElement('td');
        tdBar.style.width = '200px';
        var bar = document.createElement('div');
        bar.className = 'mini-bar';
        bar.style.width = '100%';
        var fill = document.createElement('div');
        fill.className = 'mini-bar-fill';
        fill.style.width = pct + '%';
        fill.style.background = pct >= 80 ? 'var(--jade)' : pct >= 40 ? 'var(--gold)' : 'var(--vermillion)';
        bar.appendChild(fill);
        tdBar.appendChild(bar);

        tr.appendChild(tdCode);
        tr.appendChild(tdName);
        tr.appendChild(tdDesc);
        tr.appendChild(tdScore);
        tr.appendChild(tdBar);
        tBody.appendChild(tr);

        // Add criteria row below the main row
        if (criteriaDiv) {
          var criteriaTr = document.createElement('tr');
          var criteriaTd = document.createElement('td');
          criteriaTd.setAttribute('colspan', '5');
          criteriaTd.style.padding = '0';
          criteriaTd.style.border = 'none';
          criteriaTd.appendChild(criteriaDiv);
          criteriaTr.appendChild(criteriaTd);
          tBody.appendChild(criteriaTr);
        }
      });
      tbl.appendChild(tBody);
      itemsTable.appendChild(tbl);
      scoresPanel.appendChild(itemsTable);

      root.appendChild(scoresPanel);

      // === Tab: Issues ===
      var issuesPanel = panels.issues;
      if (!org.issues || org.issues.length === 0) {
        var noIssue = document.createElement('div');
        noIssue.className = 'empty-state';
        var np = document.createElement('p');
        np.textContent = '\uBC1C\uACAC\uB41C \uBB38\uC81C\uC0AC\uD56D\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.';
        noIssue.appendChild(np);
        issuesPanel.appendChild(noIssue);
      } else {
        org.issues.forEach(function(issue) {
          var item = document.createElement('div');
          item.className = 'issue-item';

          var left = document.createElement('div');
          left.style.minWidth = '140px';

          var codeEl = document.createElement('div');
          codeEl.className = 'issue-code';
          codeEl.textContent = issue.code;
          left.appendChild(codeEl);

          var sevBadge = document.createElement('span');
          sevBadge.className = 'severity-badge severity-' + issue.severity;
          sevBadge.textContent = App.SEVERITY_LABELS[issue.severity] || issue.severity;
          left.appendChild(sevBadge);

          var right = document.createElement('div');
          right.className = 'issue-content';
          var desc = document.createElement('p');
          desc.textContent = issue.description;
          right.appendChild(desc);
          if (issue.detail) {
            var detail = document.createElement('p');
            detail.className = 'issue-detail';
            detail.textContent = issue.detail;
            right.appendChild(detail);
          }

          item.appendChild(left);
          item.appendChild(right);
          issuesPanel.appendChild(item);
        });
      }
      root.appendChild(issuesPanel);

      // === Tab: Crawlers ===
      var crawlerPanel = panels.crawlers;
      if (org.robots_txt && org.robots_txt.crawler_rules) {
        var crawlerTitle = document.createElement('h3');
        crawlerTitle.style.cssText = 'margin-bottom: var(--space-md); font-size: 1rem;';
        crawlerTitle.textContent = '\uD06C\uB864\uB7EC\uBCC4 \uC811\uADFC \uC0C1\uD0DC';
        crawlerPanel.appendChild(crawlerTitle);

        var robotsInfo = document.createElement('div');
        robotsInfo.style.cssText = 'margin-bottom: var(--space-lg); font-size: 0.85rem; color: var(--text-secondary);';
        var infoText = 'robots.txt \uC874\uC7AC: ' + (org.robots_txt.exists ? '\uC608' : '\uC544\uB2C8\uC624')
          + ' | \uBB38\uBC95 \uC720\uD6A8: ' + (org.robots_txt.syntax_valid ? '\uC608' : '\uC544\uB2C8\uC624');
        if (org.robots_txt.full_block) {
          infoText += ' | \uC804\uBA74 \uCC28\uB2E8: \uC608';
        }
        robotsInfo.textContent = infoText;
        crawlerPanel.appendChild(robotsInfo);

        var grid = document.createElement('div');
        grid.className = 'crawler-grid';
        Object.keys(org.robots_txt.crawler_rules).forEach(function(crawler) {
          var ruleData = org.robots_txt.crawler_rules[crawler];
          // FIX #1: Handle new nested object format { status: "allowed", mentioned: false }
          // as well as legacy string format "allowed"
          var status;
          var mentioned = false;
          if (ruleData && typeof ruleData === 'object') {
            status = ruleData.status;
            mentioned = ruleData.mentioned;
          } else {
            status = ruleData;
          }

          var item = document.createElement('div');
          item.className = 'crawler-item';

          var dot = document.createElement('div');
          dot.className = 'crawler-status ' + App.crawlerStatusDot(status);

          var nameSpan = document.createElement('span');
          nameSpan.className = 'crawler-name';
          nameSpan.textContent = crawler;

          item.appendChild(dot);
          item.appendChild(nameSpan);

          // Show "mentioned" badge if the crawler was explicitly mentioned in robots.txt
          if (mentioned) {
            var mentionBadge = document.createElement('span');
            mentionBadge.className = 'crawler-mentioned';
            mentionBadge.textContent = '\uBA85\uC2DC';
            item.appendChild(mentionBadge);
          }

          var label = document.createElement('span');
          label.style.cssText = 'margin-left: auto; font-size: 0.75rem; color: var(--text-tertiary);';
          label.textContent = App.crawlerStatusLabel(status);

          item.appendChild(label);
          grid.appendChild(item);
        });
        crawlerPanel.appendChild(grid);
      }

      // Metadata summary
      if (org.metadata) {
        var metaTitle = document.createElement('h3');
        metaTitle.style.cssText = 'margin: var(--space-xl) 0 var(--space-md); font-size: 1rem;';
        metaTitle.textContent = '\uBA54\uD0C0\uB370\uC774\uD130 \uD604\uD669';
        crawlerPanel.appendChild(metaTitle);

        var metaGrid = document.createElement('div');
        metaGrid.className = 'crawler-grid';
        var metaChecks = [
          { label: 'title \uD0DC\uADF8', val: org.metadata.has_title },
          { label: 'meta description', val: org.metadata.has_meta_description },
          { label: 'Open Graph', val: org.metadata.has_og_tags },
          { label: 'schema.org', val: org.metadata.has_schema_org },
          { label: 'lang \uC18D\uC131', val: org.metadata.has_lang_attribute }
        ];
        metaChecks.forEach(function(mc) {
          var item = document.createElement('div');
          item.className = 'crawler-item';
          var dot = document.createElement('div');
          dot.className = 'crawler-status ' + (mc.val ? 'allowed' : 'blocked');
          var label = document.createElement('span');
          label.style.fontSize = '0.85rem';
          label.textContent = mc.label;
          item.appendChild(dot);
          item.appendChild(label);
          metaGrid.appendChild(item);
        });
        crawlerPanel.appendChild(metaGrid);
      }

      // Technical info
      if (org.technical) {
        var techTitle = document.createElement('h3');
        techTitle.style.cssText = 'margin: var(--space-xl) 0 var(--space-md); font-size: 1rem;';
        techTitle.textContent = '\uAE30\uC220 \uD604\uD669';
        crawlerPanel.appendChild(techTitle);

        var techGrid = document.createElement('div');
        techGrid.className = 'crawler-grid';
        var techChecks = [
          { label: 'HTTPS', val: org.technical.https },
          { label: 'TTFB: ' + org.technical.ttfb_ms + 'ms', val: org.technical.ttfb_ms < 3000 },
          { label: '\uBA54\uC778 \uD398\uC774\uC9C0: ' + org.technical.main_page_status, val: org.technical.main_page_status === 200 },
          { label: '\uBAA8\uBC14\uC77C \uB300\uC751', val: org.technical.mobile_viewport },
          { label: '\uB80C\uB354\uB9C1: ' + (org.technical.primary_rendering || '-').toUpperCase(), val: org.technical.primary_rendering === 'ssr' }
        ];
        techChecks.forEach(function(tc) {
          var item = document.createElement('div');
          item.className = 'crawler-item';
          var dot = document.createElement('div');
          dot.className = 'crawler-status ' + (tc.val ? 'allowed' : 'blocked');
          var label = document.createElement('span');
          label.style.fontSize = '0.85rem';
          label.textContent = tc.label;
          item.appendChild(dot);
          item.appendChild(label);
          techGrid.appendChild(item);
        });
        crawlerPanel.appendChild(techGrid);
      }

      root.appendChild(crawlerPanel);

      // === Tab: Snapshots (FIX #4 — show raw robots.txt & llms.txt content) ===
      var snapPanel = panels.snapshots;

      // Helper to create a code block for a snapshot
      function buildSnapshotBlock(title, filename, content, exists) {
        var section = document.createElement('div');
        section.className = 'snapshot-section';

        var heading = document.createElement('h3');
        heading.style.cssText = 'margin-bottom: var(--space-md); font-size: 1rem;';
        heading.textContent = title;

        var statusBadge = document.createElement('span');
        statusBadge.className = 'snapshot-badge ' + (exists ? 'exists' : 'missing');
        statusBadge.textContent = exists ? '\uC874\uC7AC' : '\uC5C6\uC74C';
        heading.appendChild(statusBadge);

        section.appendChild(heading);

        if (content) {
          var block = document.createElement('div');
          block.className = 'code-block';

          var blockHeader = document.createElement('div');
          blockHeader.className = 'code-block-header';
          var blockTitle = document.createElement('span');
          blockTitle.className = 'code-block-title';
          blockTitle.textContent = filename;
          var copyBtn = document.createElement('button');
          copyBtn.className = 'btn-copy';
          copyBtn.textContent = '\u2398 \uBCF5\uC0AC\uD558\uAE30';
          copyBtn.addEventListener('click', function() {
            App.copyToClipboard(content, copyBtn);
          });
          blockHeader.appendChild(blockTitle);
          blockHeader.appendChild(copyBtn);
          block.appendChild(blockHeader);

          var pre = document.createElement('pre');
          pre.textContent = content;
          block.appendChild(pre);
          section.appendChild(block);
        } else {
          var emptyMsg = document.createElement('div');
          emptyMsg.className = 'info-box info';
          var emptyP = document.createElement('p');
          emptyP.textContent = filename + ' \uD30C\uC77C\uC774 \uC874\uC7AC\uD558\uC9C0 \uC54A\uAC70\uB098 \uC2A4\uB0C5\uC0F7\uC744 \uC218\uC9D1\uD560 \uC218 \uC5C6\uC5C8\uC2B5\uB2C8\uB2E4.';
          emptyMsg.appendChild(emptyP);
          section.appendChild(emptyMsg);
        }

        return section;
      }

      // robots.txt snapshot
      var robotsSnapshot = (org.robots_txt && org.robots_txt.snapshot) ? org.robots_txt.snapshot : null;
      var robotsExists = org.robots_txt && org.robots_txt.exists;
      snapPanel.appendChild(buildSnapshotBlock('\uC6D0\uBCF8 robots.txt', 'robots.txt', robotsSnapshot, robotsExists));

      // llms.txt snapshot
      var llmsSnapshot = (org.llms_txt && org.llms_txt.snapshot) ? org.llms_txt.snapshot : null;
      var llmsExists = org.llms_txt && org.llms_txt.exists;
      snapPanel.appendChild(buildSnapshotBlock('\uC6D0\uBCF8 llms.txt', 'llms.txt', llmsSnapshot, llmsExists));

      // Additional info
      if (org.sitemap_xml) {
        var sitemapInfo = document.createElement('div');
        sitemapInfo.className = 'snapshot-section';
        var sitemapTitle = document.createElement('h3');
        sitemapTitle.style.cssText = 'margin-bottom: var(--space-md); font-size: 1rem;';
        sitemapTitle.textContent = 'sitemap.xml \uC815\uBCF4';
        var sitemapBadge = document.createElement('span');
        sitemapBadge.className = 'snapshot-badge ' + (org.sitemap_xml.exists ? 'exists' : 'missing');
        sitemapBadge.textContent = org.sitemap_xml.exists ? '\uC874\uC7AC' : '\uC5C6\uC74C';
        sitemapTitle.appendChild(sitemapBadge);
        sitemapInfo.appendChild(sitemapTitle);

        if (org.sitemap_xml.exists) {
          var sitemapDetails = document.createElement('div');
          sitemapDetails.style.cssText = 'font-size: 0.85rem; color: var(--text-secondary); padding: var(--space-md); border: 1px solid var(--border-light); border-radius: var(--radius-md);';
          sitemapDetails.textContent = '\uC720\uD6A8\uC131: ' + (org.sitemap_xml.valid ? '\uC720\uD6A8' : '\uBB38\uC81C \uC788\uC74C')
            + ' | URL \uC218: ' + (org.sitemap_xml.url_count || 0).toLocaleString() + '\uAC1C';
          sitemapInfo.appendChild(sitemapDetails);
        }
        snapPanel.appendChild(sitemapInfo);
      }

      var snapNote = document.createElement('div');
      snapNote.className = 'info-box info';
      snapNote.style.marginTop = 'var(--space-md)';
      var snapNoteP = document.createElement('p');
      snapNoteP.textContent = '\uC704 \uC2A4\uB0C5\uC0F7\uC740 \uBD84\uC11D \uC2DC\uC810\uC5D0 \uC218\uC9D1\uB41C \uC6D0\uBCF8 \uD30C\uC77C \uB0B4\uC6A9\uC785\uB2C8\uB2E4. \uD604\uC7AC \uC2DC\uC810\uC758 \uD30C\uC77C\uACFC \uB2E4\uB97C \uC218 \uC788\uC2B5\uB2C8\uB2E4.';
      snapNote.appendChild(snapNoteP);
      snapPanel.appendChild(snapNote);

      root.appendChild(snapPanel);

      // === Tab: Suggestion (FIX #3 — handle missing suggested_robots_txt / suggested_llms_txt) ===
      var sugPanel = panels.suggestion;

      // Check if suggested files exist in data
      var hasSuggestedRobots = !!org.suggested_robots_txt;
      var hasSuggestedLlms = !!org.suggested_llms_txt;

      if (hasSuggestedRobots) {
        var rtTitle = document.createElement('h3');
        rtTitle.style.cssText = 'margin-bottom: var(--space-md); font-size: 1rem;';
        rtTitle.textContent = '\uC81C\uC548 robots.txt';
        sugPanel.appendChild(rtTitle);

        var rtBlock = document.createElement('div');
        rtBlock.className = 'code-block';
        var rtHeader = document.createElement('div');
        rtHeader.className = 'code-block-header';
        var rtFileName = document.createElement('span');
        rtFileName.className = 'code-block-title';
        rtFileName.textContent = 'robots.txt';
        var rtCopy = document.createElement('button');
        rtCopy.className = 'btn-copy';
        rtCopy.textContent = '\u2398 \uBCF5\uC0AC\uD558\uAE30';
        rtCopy.addEventListener('click', function() {
          App.copyToClipboard(org.suggested_robots_txt, rtCopy);
        });
        rtHeader.appendChild(rtFileName);
        rtHeader.appendChild(rtCopy);
        rtBlock.appendChild(rtHeader);
        var rtPre = document.createElement('pre');
        rtPre.textContent = org.suggested_robots_txt;
        rtBlock.appendChild(rtPre);
        sugPanel.appendChild(rtBlock);
      }

      if (hasSuggestedLlms) {
        var ltTitle = document.createElement('h3');
        ltTitle.style.cssText = 'margin: var(--space-xl) 0 var(--space-md); font-size: 1rem;';
        ltTitle.textContent = '\uC81C\uC548 llms.txt';
        sugPanel.appendChild(ltTitle);

        var ltBlock = document.createElement('div');
        ltBlock.className = 'code-block';
        var ltHeader = document.createElement('div');
        ltHeader.className = 'code-block-header';
        var ltFileName = document.createElement('span');
        ltFileName.className = 'code-block-title';
        ltFileName.textContent = 'llms.txt';
        var ltCopy = document.createElement('button');
        ltCopy.className = 'btn-copy';
        ltCopy.textContent = '\u2398 \uBCF5\uC0AC\uD558\uAE30';
        ltCopy.addEventListener('click', function() {
          App.copyToClipboard(org.suggested_llms_txt, ltCopy);
        });
        ltHeader.appendChild(ltFileName);
        ltHeader.appendChild(ltCopy);
        ltBlock.appendChild(ltHeader);
        var ltPre = document.createElement('pre');
        ltPre.textContent = org.suggested_llms_txt;
        ltBlock.appendChild(ltPre);
        sugPanel.appendChild(ltBlock);
      }

      // If neither suggested file exists, generate recommendations based on issues
      if (!hasSuggestedRobots && !hasSuggestedLlms) {
        var recTitle = document.createElement('h3');
        recTitle.style.cssText = 'margin-bottom: var(--space-md); font-size: 1rem;';
        recTitle.textContent = '\uBD84\uC11D \uACB0\uACFC \uAE30\uBC18 \uAC1C\uC120 \uC81C\uC548';
        sugPanel.appendChild(recTitle);

        var recommendations = [];

        // Build recommendations from issues
        if (org.issues && org.issues.length > 0) {
          org.issues.forEach(function(issue) {
            var rec = { title: '', body: '' };
            if (issue.code.indexOf('RT-04') === 0) {
              rec.title = 'robots.txt \uC804\uBA74 \uCC28\uB2E8 \uD574\uC81C';
              rec.body = '\uD604\uC7AC "Disallow: /" \uB85C \uBAA8\uB4E0 \uD06C\uB864\uB7EC\uAC00 \uCC28\uB2E8\uB418\uC5B4 \uC788\uC2B5\uB2C8\uB2E4. \uBCF4\uB3C4\uC790\uB8CC, \uC815\uCC45\uC18C\uAC1C, \uACF5\uC9C0\uC0AC\uD56D \uB4F1 \uACF5\uACF5 \uCF58\uD150\uCE20 \uACBD\uB85C\uB294 \uD06C\uB864\uB7EC \uC811\uADFC\uC744 \uD5C8\uC6A9\uD558\uB294 \uAC83\uC744 \uAD8C\uC7A5\uD569\uB2C8\uB2E4.';
              recommendations.push(rec);
            } else if (issue.code.indexOf('RT-03') === 0) {
              rec.title = 'LLM \uD06C\uB864\uB7EC \uCC28\uB2E8 \uD574\uC81C';
              rec.body = issue.description + '. GPTBot, ClaudeBot \uB4F1 LLM \uD06C\uB864\uB7EC\uAC00 \uACF5\uACF5 \uCF58\uD150\uCE20\uC5D0 \uC811\uADFC\uD560 \uC218 \uC788\uB3C4\uB85D robots.txt\uC5D0\uC11C \uD574\uB2F9 \uD06C\uB864\uB7EC \uCC28\uB2E8\uC744 \uC81C\uAC70\uD574 \uC8FC\uC138\uC694.';
              recommendations.push(rec);
            } else if (issue.code.indexOf('LT-01') === 0) {
              rec.title = 'llms.txt \uD30C\uC77C \uCD94\uAC00';
              rec.body = '\uAE30\uAD00 \uC18C\uAC1C, \uC8FC\uC694 \uCF58\uD150\uCE20 \uACBD\uB85C, \uC5F0\uB77D\uCC98 \uB4F1\uC744 \uD3EC\uD568\uD558\uB294 llms.txt \uD30C\uC77C\uC744 \uC0DD\uC131\uD558\uC5EC \uC6F9\uC0AC\uC774\uD2B8 \uB8E8\uD2B8\uC5D0 \uBC30\uCE58\uD558\uBA74 LLM\uC774 \uAE30\uAD00 \uC815\uBCF4\uB97C \uB354 \uC798 \uC774\uD574\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.';
              recommendations.push(rec);
            } else if (issue.code.indexOf('SM-01') === 0) {
              rec.title = 'sitemap.xml \uCD94\uAC00';
              rec.body = 'sitemap.xml\uC744 \uC0DD\uC131\uD558\uC5EC \uBCF4\uB3C4\uC790\uB8CC, \uC815\uCC45\uC18C\uAC1C, \uACF5\uC9C0\uC0AC\uD56D URL\uC744 \uD3EC\uD568\uD558\uBA74 LLM\uACFC \uAC80\uC0C9\uC5D4\uC9C4\uC774 \uCF58\uD150\uCE20\uB97C \uB354 \uC798 \uBC1C\uACAC\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.';
              recommendations.push(rec);
            } else if (issue.code.indexOf('CA-05') === 0) {
              rec.title = 'SSR(Server-Side Rendering) \uB3C4\uC785';
              rec.body = '\uD604\uC7AC CSR(\uD074\uB77C\uC774\uC5B8\uD2B8 \uC0AC\uC774\uB4DC \uB80C\uB354\uB9C1) \uBC29\uC2DD\uC73C\uB85C LLM\uC774 \uCF58\uD150\uCE20\uB97C \uC77D\uAE30 \uC5B4\uB835\uC2B5\uB2C8\uB2E4. SSR \uB610\uB294 \uC815\uC801 HTML \uC0DD\uC131\uC744 \uD1B5\uD574 JS \uC5C6\uC774\uB3C4 \uCF58\uD150\uCE20\uB97C \uC77D\uC744 \uC218 \uC788\uB3C4\uB85D \uAC1C\uC120\uD574 \uC8FC\uC138\uC694.';
              recommendations.push(rec);
            } else if (issue.code.indexOf('SD-02') === 0) {
              rec.title = 'meta description \uCD94\uAC00';
              rec.body = '\uAC01 \uD398\uC774\uC9C0\uC5D0 \uACE0\uC720\uD55C meta description\uC744 \uCD94\uAC00\uD558\uBA74 LLM\uC774 \uD398\uC774\uC9C0 \uB0B4\uC6A9\uC744 \uD30C\uC545\uD558\uB294 \uB370 \uB3C4\uC6C0\uC774 \uB429\uB2C8\uB2E4.';
              recommendations.push(rec);
            } else if (issue.code.indexOf('SD-05') === 0) {
              rec.title = 'html lang \uC18D\uC131 \uCD94\uAC00';
              rec.body = '<html lang="ko"> \uC18D\uC131\uC744 \uCD94\uAC00\uD558\uC5EC LLM\uC774 \uD398\uC774\uC9C0 \uC5B8\uC5B4\uB97C \uC815\uD655\uD788 \uC778\uC2DD\uD560 \uC218 \uC788\uB3C4\uB85D \uD574\uC8FC\uC138\uC694.';
              recommendations.push(rec);
            }
          });
        }

        // Always add a general recommendation if score is low
        if (org.scores.total < 60) {
          recommendations.push({
            title: '\uC885\uD569 \uAC1C\uC120 \uD544\uC694',
            body: '\uD604\uC7AC \uC810\uC218\uAC00 ' + org.scores.total + '\uC810\uC73C\uB85C, LLM \uCE5C\uD654\uC131\uC774 \uBD80\uC871\uD569\uB2C8\uB2E4. robots.txt \uC815\uCC45 \uAC1C\uC120, \uAD6C\uC870\uD654\uB41C \uB370\uC774\uD130 \uCD94\uAC00, llms.txt \uC0DD\uC131 \uB4F1\uC744 \uC885\uD569\uC801\uC73C\uB85C \uAC80\uD1A0\uD574 \uC8FC\uC138\uC694.'
          });
        }

        if (recommendations.length === 0) {
          var perfectMsg = document.createElement('div');
          perfectMsg.className = 'empty-state';
          var perfectP = document.createElement('p');
          perfectP.textContent = '\uD2B9\uBCC4\uD55C \uAC1C\uC120 \uC81C\uC548 \uC0AC\uD56D\uC774 \uC5C6\uC2B5\uB2C8\uB2E4. \uC6B0\uC218\uD55C LLM \uCE5C\uD654\uC131\uC744 \uBCF4\uC5EC\uC8FC\uACE0 \uC788\uC2B5\uB2C8\uB2E4.';
          perfectMsg.appendChild(perfectP);
          sugPanel.appendChild(perfectMsg);
        } else {
          recommendations.forEach(function(rec) {
            var card = document.createElement('div');
            card.className = 'recommendation-card';
            var cardTitle = document.createElement('div');
            cardTitle.className = 'recommendation-card-title';
            cardTitle.textContent = rec.title;
            var cardBody = document.createElement('div');
            cardBody.className = 'recommendation-card-body';
            cardBody.textContent = rec.body;
            card.appendChild(cardTitle);
            card.appendChild(cardBody);
            sugPanel.appendChild(card);
          });
        }

        // Show current snapshots as reference in suggestion tab
        if (robotsSnapshot) {
          var refTitle = document.createElement('h3');
          refTitle.style.cssText = 'margin: var(--space-xl) 0 var(--space-md); font-size: 1rem;';
          refTitle.textContent = '\uD604\uC7AC robots.txt (\uCC38\uACE0\uC6A9)';
          sugPanel.appendChild(refTitle);

          var refBlock = document.createElement('div');
          refBlock.className = 'code-block';
          var refHeader = document.createElement('div');
          refHeader.className = 'code-block-header';
          var refName = document.createElement('span');
          refName.className = 'code-block-title';
          refName.textContent = 'robots.txt (\uD604\uC7AC)';
          refHeader.appendChild(refName);
          refBlock.appendChild(refHeader);
          var refPre = document.createElement('pre');
          refPre.textContent = robotsSnapshot;
          refBlock.appendChild(refPre);
          sugPanel.appendChild(refBlock);
        }
      }

      var note = document.createElement('div');
      note.className = 'info-box info';
      note.style.marginTop = 'var(--space-xl)';
      var noteP = document.createElement('p');
      if (hasSuggestedRobots || hasSuggestedLlms) {
        noteP.textContent = '\uC704 \uC81C\uC548\uC740 \uBD84\uC11D \uACB0\uACFC\uB97C \uAE30\uBC18\uC73C\uB85C \uC790\uB3D9 \uC0DD\uC131\uB41C \uAC83\uC785\uB2C8\uB2E4. \uAE30\uAD00\uC758 \uBCF4\uC548 \uC815\uCC45\uACFC \uC2E4\uC81C \uC6B4\uC601 \uD658\uACBD\uC744 \uACE0\uB824\uD558\uC5EC \uC801\uC808\uD788 \uC218\uC815 \uD6C4 \uC801\uC6A9\uD574 \uC8FC\uC2DC\uAE30 \uBC14\uB78D\uB2C8\uB2E4.';
      } else {
